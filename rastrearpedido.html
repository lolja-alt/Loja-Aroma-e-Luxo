<h2>Rastrear Pedido</h2>
<input type="text" id="codigo" placeholder="PED-837291" />
<button onclick="buscarPedido()">Buscar</button>

<div id="resultado"></div>

<script>
async function buscarPedido() {
  const codigo = document.getElementById('codigo').value;
  
  const { data } = await supabase
    .from('pedidos')
    .select('*')
    .eq('codigo', codigo)
    .single();

  if (data) {
    document.getElementById('resultado').innerHTML = `
      <h3>Pedido ${data.codigo}</h3>
      <p>Status: <strong>${data.status}</strong></p>
      <p>Total: R$ ${data.total}</p>
      <p>Data: ${new Date(data.data).toLocaleString('pt-BR')}</p>
    `;
  } else {
    alert("Pedido não encontrado");
  }
}
</script>

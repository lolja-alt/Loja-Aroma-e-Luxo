<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho - Aroma e Luxo</title>
  <style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f4f4f4;
        color: #333;
    }

    header {
        background: linear-gradient(135deg, #6B48FF, #9B6EFF);
        color: white;
        padding: 50px 20px;
        text-align: center;
        position: relative;
    }

    .cart-icon-fixed {
        position: absolute;
        top: 25px;
        right: 30px;
        font-size: 28px;
        cursor: pointer;
        background: rgba(255,255,255,0.2);
        padding: 10px 14px;
        border-radius: 50%;
        transition: 0.3s;
    }

    .cart-icon-fixed:hover {
        background: rgba(255,255,255,0.35);
    }

    .cart-count {
        position: absolute;
        top: -6px;
        right: -6px;
        background: #FF4D6B;
        color: white;
        font-size: 12px;
        font-weight: bold;
        padding: 2px 7px;
        border-radius: 50%;
        min-width: 18px;
        text-align: center;
    }

    nav {
        background: #2C2C2C;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        padding: 8px 0;
    }

    nav a {
        padding: 16px 24px;
        color: white;
        text-decoration: none;
        margin: 2px;
        transition: 0.3s;
    }

    nav a:hover {
        background: #6B48FF;
        color: white;
    }

    .carrinho-container {
        max-width: 900px;
        margin: 40px auto;
        padding: 30px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0,0,0,0.08);
    }

    .item-carrinho {
        display: grid;
        grid-template-columns: 3fr 1fr 1fr 1fr 80px;
        gap: 15px;
        padding: 15px 0;
        border-bottom: 1px solid #eee;
        align-items: center;
    }

    .item-info { font-weight: 500; }
    .item-preco, .item-subtotal { text-align: right; }

    .controle-quantidade {
        display: flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
    }

    .btn-qty {
        width: 36px;
        height: 36px;
        background: #f5f5f5;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 1.2rem;
        cursor: pointer;
    }

    .btn-remover {
        background: #e63946;
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
    }

    .carrinho-vazio {
        text-align: center;
        padding: 60px 0;
        font-size: 1.3rem;
        color: #777;
    }

    .resumo-carrinho {
        margin-top: 30px;
        text-align: right;
        font-size: 1.4rem;
    }

    .btn-finalizar {
        background: #6B48FF;
        color: white;
        border: none;
        padding: 14px 30px;
        font-size: 1.2rem;
        border-radius: 6px;
        cursor: pointer;
        margin-top: 20px;
        transition: 0.3s;
    }

    .btn-finalizar:hover {
        background: #5439cc;
    }

    footer {
        background: #1F1F1F;
        color: white;
        text-align: center;
        padding: 20px;
        margin-top: 60px;
    }
  </style>
</head>
<body>

<header>
    <div class="cart-icon-fixed" onclick="window.location.href='carrinho.html'">
        🛒
        <span id="cartCount" class="cart-count">0</span>
    </div>
    <h1>Aroma e Luxo</h1>
    <p>Fragrâncias exclusivas • Perfumes de luxo • Cosmética premium</p>
</header>

<nav>
    <a href="index.html">Início</a>
    <a href="catalogo.html">Catálogo</a>
    <a href="sobrenos.html">Sobre Nós</a>
    <a href="contato.html">Contato</a>
    <a href="promoções.html">Promoções</a>
    <a href="maisvendidos.html">Mais Vendidos</a>
    <a href="cadastro-clientes.html">Cadastro</a>
    <a href="carrinho.html">Carrinho</a>
</nav>

<div class="carrinho-container">
    <h1>Seu Carrinho</h1>
   
    <div id="itens-carrinho"></div>
   
    <div class="resumo-carrinho">
        <p>Total de itens: <strong><span id="quantidade-total">0</span></strong></p>
        <p>Valor total: <strong id="total-carrinho">R$ 0,00</strong></p>
        <button class="btn-finalizar" onclick="alert('Finalizando compra... (implementar pagamento)')">
            Finalizar Compra
        </button>
        <button onclick="limparCarrinho()" style="margin-left:15px; background:#757575; color:white; padding:12px 20px; border:none; border-radius:6px; cursor:pointer;">
            Limpar Carrinho
        </button>
    </div>
</div>

<footer>
    <p>© 2026 Aroma e Luxo - Todos os direitos reservados</p>
</footer>

<script src="js/carrinho.js"></script>
</body>
</html>
